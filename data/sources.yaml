# --------------------------------------------------------------------------- #
# Source list for the tracker.
#
# Required fields per source:
#   id             : unique slug (also used as a fallback manual-text filename)
#   date           : YYYY-MM-DD (the date of the STATEMENT, not the article)
#   source_type    : white_house | social_media | video_transcript | news |
#                    company_release | other
#   source_quality : official | high | medium | low
#
# Provide the text in ONE of these ways (checked in order):
#   text:             inline (best for short social posts)
#   manual_text_file: a file under data/raw/manual_texts/
#   url:              fetched over HTTP if fetching is enabled (best-effort)
#
# Optional:
#   title, speaker (default "Donald J. Trump"), url (always keep for provenance)
#   verbatim_quote: true   -> the text is a direct quote (raises confidence cap)
#   quote_uncertain: true  -> not sure it's verbatim (caps confidence at 3)
#   overrides:             -> hand-set fields, e.g. curated sentiment. Use
#                            "_all_" for all companies or the normalized name.
#
# NOTE: every quote below was verified against the cited source. The exact post
# URLs for social-media items point to reputable outlets that reproduce the
# verbatim quote (Trump's own accounts are not directly fetchable).
# --------------------------------------------------------------------------- #

sources:
  # 1) TSMC — White House remarks (OFFICIAL). Paired with #2 to show dedupe.
  - id: tsmc-wh-2025-03-03
    date: 2025-03-03
    title: "Remarks announcing TSMC's $100B U.S. investment (Roosevelt Room)"
