# Company alias / normalization table.
#
# Each entry defines ONE canonical company. `aliases` are matched against text
# case-insensitively with word boundaries (whitespace-flexible). Longer aliases
# are preferred over shorter ones, so "Hewlett Packard Enterprise" wins over a
# bare "HP".
#
# Fields:
#   normalized : canonical display name (the value written to output)
#   aliases    : surface forms to match (include the canonical name itself)
#   ticker     : primary exchange ticker, "" if none / unknown. NEVER guess.
#   exchange   : listing venue, "" if private/unknown
#   status     : public | private | subsidiary | unknown
#   sector     : free-text sector label
#   themes     : default theme_tags applied when this company is mentioned
#
# Maintenance: add new companies here. To stop a token from being treated as a
# company, add it to blacklist.yaml instead of removing it here.

companies:
  # ---- Mega-cap tech ---------------------------------------------------- #
  - normalized: "Apple Inc."
    aliases: ["Apple", "Apple Inc", "Apple Inc."]
    ticker: "AAPL"
    exchange: "NASDAQ"
    status: "public"
    sector: "Technology — Consumer Electronics"
    themes: ["consumer", "manufacturing"]
    ambiguous: true   # "apple" the fruit -> require a capital letter
    suppress_context: ["red apple"]   # "Red Apple Group" (J. Catsimatidis) != Apple Inc.

  - normalized: "Microsoft Corporation"
    aliases: ["Microsoft", "Microsoft Corp", "MSFT"]
    ticker: "MSFT"
    exchange: "NASDAQ"
    status: "public"
    sector: "Technology — Software"
    themes: ["cloud", "AI"]

