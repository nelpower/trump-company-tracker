    status: "public"
    sector: "Technology — E-commerce / Cloud"
    themes: ["cloud", "consumer"]
    # Trump frequently links books "on Amazon" — those are sales links, not
    # commentary about the company. Drop them.
    suppress_context: ["book", "must read", "bookstore", "paperback",
                       "hardcover", "memoir", "bestseller", "audiobook",
                       "amazon.com", "/dp/", "order your copy"]

