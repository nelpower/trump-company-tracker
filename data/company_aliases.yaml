# Company alias / normalization table.
#
# Each entry defines ONE canonical company. `aliases` are matched against text
# case-insensitively with word boundaries (whitespace-flexible). Longer aliases
# are preferred over shorter ones, so "Hewlett Packard Enterprise" wins over a
# bare "HP".
#
# Fields:
#   normalized : canonical display name (the value written to output)
#   aliases    : surface forms to match (include the canonical name itself)
#   ticker     : primary exchange ticker, "" if none / unknown. NEVER guess.
#   exchange   : listing venue, "" if private/unknown
#   status     : public | private | subsidiary | unknown
#   sector     : free-text sector label
#   themes     : default theme_tags applied when this company is mentioned
#
# Maintenance: add new companies here. To stop a token from being treated as a
# company, add it to blacklist.yaml instead of removing it here.

companies:
  # ---- Mega-cap tech ---------------------------------------------------- #
  - normalized: "Apple Inc."
    aliases: ["Apple", "Apple Inc", "Apple Inc."]
    ticker: "AAPL"
    exchange: "NASDAQ"
    status: "public"
    sector: "Technology — Consumer Electronics"
    themes: ["consumer", "manufacturing"]
    ambiguous: true   # "apple" the fruit -> require a capital letter

  - normalized: "Microsoft Corporation"
    aliases: ["Microsoft", "Microsoft Corp", "MSFT"]
    ticker: "MSFT"
    exchange: "NASDAQ"
    status: "public"
    sector: "Technology — Software"
    themes: ["cloud", "AI"]

  - normalized: "Alphabet Inc. (Google)"
    aliases: ["Alphabet", "Google", "Google LLC"]
    ticker: "GOOGL"
    exchange: "NASDAQ"
    status: "public"
    sector: "Technology — Internet"
    themes: ["AI", "cloud"]

  - normalized: "Amazon.com, Inc."
    aliases: ["Amazon", "Amazon.com", "AWS"]
    ticker: "AMZN"
    exchange: "NASDAQ"
    status: "public"
    sector: "Technology — E-commerce / Cloud"
    themes: ["cloud", "consumer"]
    # Trump frequently links books "on Amazon" — those are sales links, not
    # commentary about the company. Drop them.
    suppress_context: ["book", "must read", "bookstore", "paperback",
                       "hardcover", "memoir", "bestseller", "audiobook",
                       "amazon.com", "/dp/", "order your copy"]

  - normalized: "Meta Platforms, Inc."
    aliases: ["Meta", "Meta Platforms", "Facebook"]
    ticker: "META"
    exchange: "NASDAQ"
    status: "public"
    sector: "Technology — Internet"
    themes: ["AI", "consumer"]
    ambiguous: true   # "meta" the prefix -> require a capital letter

  - normalized: "International Business Machines (IBM)"
    aliases: ["IBM", "International Business Machines"]
    ticker: "IBM"
    exchange: "NYSE"
    status: "public"
    sector: "Technology — IT Services"
    themes: ["AI", "cloud"]

  - normalized: "Oracle Corporation"
    aliases: ["Oracle", "Oracle Corp"]
    ticker: "ORCL"
    exchange: "NYSE"
    status: "public"
    sector: "Technology — Software / Cloud"
    themes: ["cloud", "AI", "data_center"]
    ambiguous: true   # "oracle" the noun -> require a capital letter

  # ---- Semiconductors / AI hardware ------------------------------------- #
