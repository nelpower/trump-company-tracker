name: daily-update

# Runs every day at 04:00 UTC = 12:00 Asia/Shanghai (Beijing).
# Also runnable on demand from the Actions tab.
on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

permissions:
  contents: write       # commit the refreshed dataset/state back to the repo
  pages: write          # deploy to GitHub Pages
  id-token: write

# Never run two updates at once.
concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run pipeline (Truth Social + build site)
        run: python -m src.pipeline --truth-social --site-dir site

      - name: Commit refreshed dataset
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A data/processed outputs
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: daily update $(date -u +%F)"
            git push
          fi

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
